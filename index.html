<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive machine learning playground for learning regression models."
    />
    <style>
      html[data-route-theme="dark"],
      html[data-route-theme="dark"] body,
      html[data-route-theme="dark"] #root {
        background: oklch(14.5% 0 0);
        color-scheme: dark;
      }
    </style>
    <script>
      if ("scrollRestoration" in window.history) {
        window.history.scrollRestoration = "manual";
      }

      if (window.location.pathname === "/explore") {
        document.documentElement.dataset.routeTheme = "dark";
      }
    </script>
    <title>Smile Project</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
