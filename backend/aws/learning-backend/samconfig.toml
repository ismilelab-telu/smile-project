version = 0.1

[default.global.parameters]
stack_name = "smile-learning-backend"
region = "ap-southeast-1"
profile = "smile-dev"

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
fail_on_empty_changeset = false
# Do not store LearningBackendProxySecret in this file. For production deploys,
# pass the current shared secret with --parameter-overrides or preserve the
# existing CloudFormation NoEcho value; otherwise non-health routes fail closed.
parameter_overrides = "AllowedOrigins=\"http://127.0.0.1:5317,http://localhost:5317,https://smile-project.pages.dev\" FunctionUrlAllowedOrigins=\"http://127.0.0.1:5317,http://localhost:5317\" ResendApiKeySecretName=\"smile/resend/api-key\" LearningBackendRequireProxySecret=\"true\""
tags = "Project=\"Smile\" Environment=\"dev\""

[ci.global.parameters]
stack_name = "smile-learning-backend"
region = "ap-southeast-1"

[ci.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
fail_on_empty_changeset = false
parameter_overrides = "AllowedOrigins=\"http://127.0.0.1:5317,http://localhost:5317,https://smile-project.pages.dev\" FunctionUrlAllowedOrigins=\"http://127.0.0.1:5317,http://localhost:5317\" ResendApiKeySecretName=\"smile/resend/api-key\" LearningBackendRequireProxySecret=\"true\""
tags = "Project=\"Smile\" Environment=\"dev\""
