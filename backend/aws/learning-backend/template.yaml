AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Smile learning backend for dataset ZIP upload and Pandas loading validation.

Parameters:
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: "http://127.0.0.1:5317,http://localhost:5317"
    Description: Browser origins allowed to call the Lambda Function URL and upload to S3.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 1024
    Environment:
      Variables:
        UPLOAD_BUCKET: !Ref DatasetUploadBucket
        LEARNING_PROGRESS_TABLE: !Ref LearningProgressTable
        MAX_ZIP_BYTES: "52428800"
        MAX_UNZIPPED_BYTES: "104857600"
        MAX_PROGRESS_JSON_BYTES: "300000"
        COGNITO_USER_POOL_ID: !Ref SmileUserPool
        COGNITO_CLIENT_ID: !Ref SmileUserPoolClient
        COGNITO_REGION: !Ref AWS::Region

Resources:
  LearningProgressTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  SmileUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE

  SmileUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-web-client"
      UserPoolId: !Ref SmileUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  DatasetUploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
            AllowedOrigins: !Ref AllowedOrigins
            ExposedHeaders:
              - ETag
            MaxAge: 300
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTemporaryUploads
            Status: Enabled
            Prefix: uploads/
            ExpirationInDays: 1

  LearningBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DatasetUploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref LearningProgressTable
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: !Ref AllowedOrigins
          AllowMethods:
            - GET
            - POST
            - PUT
          AllowHeaders:
            - authorization
            - content-type
          MaxAge: 300

Outputs:
  LearningBackendFunctionUrl:
    Description: Public HTTPS endpoint for the learning backend.
    Value: !GetAtt LearningBackendFunctionUrl.FunctionUrl
  CognitoUserPoolId:
    Description: Cognito user pool used by the Smile web app.
    Value: !Ref SmileUserPool
  CognitoUserPoolClientId:
    Description: Public Cognito app client ID used by the Smile web app.
    Value: !Ref SmileUserPoolClient
  CognitoRegion:
    Description: Cognito region used by the Smile web app.
    Value: !Ref AWS::Region
  DatasetUploadBucketName:
    Description: Private temporary dataset upload bucket.
    Value: !Ref DatasetUploadBucket
  LearningProgressTableName:
    Description: DynamoDB table storing synced learning progress per Cognito user.
    Value: !Ref LearningProgressTable
