AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Smile learning backend for dataset ZIP upload and Pandas loading validation.

Parameters:
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: "http://127.0.0.1:5317,http://localhost:5317"
    Description: Browser origins allowed to upload directly to S3 with presigned URLs.
  FunctionUrlAllowedOrigins:
    Type: CommaDelimitedList
    Default: "http://127.0.0.1:5317,http://localhost:5317"
    Description: Local/dev browser origins allowed to call the Lambda Function URL directly. Production browser traffic should use the Cloudflare Pages proxy.
  ResendApiKeySecretName:
    Type: String
    Default: "smile/resend/api-key"
    Description: Secrets Manager secret name that stores the Resend API key.
  ResendFromEmail:
    Type: String
    Default: "Smile Lab <auth@smilelab.me>"
    Description: Verified Resend sender used for Cognito auth emails.
  ResendReplyToEmail:
    Type: String
    Default: ""
    Description: Optional reply-to email address for Cognito auth emails.
  ResendAuthTemplateId:
    Type: String
    Default: "smile-auth-code"
    Description: Published Resend template ID or alias used for Cognito auth emails.
  AuthConfirmationCodePepper:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: HMAC pepper for confirmation code hashing. Set to a random secret of at least 32 characters.
  LearningBackendProxySecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Shared secret that allows the Cloudflare Pages proxy to pass original source IP headers.
  LearningBackendRequireProxySecret:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Require the Cloudflare Pages proxy secret for every non-health HTTP backend route.
  GoogleOAuthClientId:
    Type: String
    Default: ""
    Description: Google OAuth client ID for Cognito federated sign-in. Leave empty to disable Google sign-in.
  GoogleOAuthClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Google OAuth client secret for Cognito federated sign-in. Leave empty to disable Google sign-in.
  MicrosoftOAuthClientId:
    Type: String
    Default: ""
    Description: Microsoft OAuth client ID for Cognito federated sign-in. Leave empty to disable Microsoft sign-in.
  MicrosoftOAuthClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Microsoft OAuth client secret for Cognito federated sign-in. Leave empty to disable Microsoft sign-in.
  MicrosoftOAuthIssuer:
    Type: String
    Default: "https://login.microsoftonline.com/9188040d-6c67-4c5b-b112-36a304b66dad/v2.0"
    Description: Microsoft OIDC issuer. Default supports personal Microsoft accounts only; use a tenant-specific issuer for one work/school organization.
  CognitoOAuthDomainPrefix:
    Type: String
    Default: ""
    Description: Cognito Hosted UI domain prefix for OAuth sign-in. Leave empty to disable federated OAuth sign-in.
  CognitoOAuthCallbackUrls:
    Type: CommaDelimitedList
    Default: "https://learn.smile.me/auth/callback/google,https://learn.smile.me/auth/callback/microsoft"
    Description: Exact callback URLs allowed by Cognito and the backend OAuth callback validator.
  CognitoOAuthLogoutUrls:
    Type: CommaDelimitedList
    Default: "https://learn.smile.me/learn"
    Description: Logout URLs allowed by Cognito Hosted UI when federated OAuth is enabled.

Conditions:
  HasGoogleOAuthClientId: !Not [!Equals [!Ref GoogleOAuthClientId, ""]]
  HasGoogleOAuthClientSecret: !Not [!Equals [!Ref GoogleOAuthClientSecret, ""]]
  HasMicrosoftOAuthClientId: !Not [!Equals [!Ref MicrosoftOAuthClientId, ""]]
  HasMicrosoftOAuthClientSecret: !Not [!Equals [!Ref MicrosoftOAuthClientSecret, ""]]
  HasMicrosoftOAuthIssuer: !Not [!Equals [!Ref MicrosoftOAuthIssuer, ""]]
  HasCognitoOAuthDomainPrefix: !Not [!Equals [!Ref CognitoOAuthDomainPrefix, ""]]
  EnableGoogleOAuth: !And
    - !Condition HasGoogleOAuthClientId
    - !Condition HasGoogleOAuthClientSecret
    - !Condition HasCognitoOAuthDomainPrefix
  EnableMicrosoftOAuth: !And
    - !Condition HasMicrosoftOAuthClientId
    - !Condition HasMicrosoftOAuthClientSecret
    - !Condition HasMicrosoftOAuthIssuer
    - !Condition HasCognitoOAuthDomainPrefix
  EnableAnyOAuth: !Or
    - !Condition EnableGoogleOAuth
    - !Condition EnableMicrosoftOAuth
  DisableOAuth: !Not [!Condition EnableAnyOAuth]

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 1024

Resources:
  LearningProgressTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  UsernameReservationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: usernameKey
          AttributeType: S
      KeySchema:
        - AttributeName: usernameKey
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  AuthCooldownTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cooldownKey
          AttributeType: S
      KeySchema:
        - AttributeName: cooldownKey
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  CognitoEmailSenderKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${AWS::StackName} Cognito custom email sender encryption key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableIamUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowCognitoEncryptVerificationCodes
            Effect: Allow
            Principal:
              Service: cognito-idp.amazonaws.com
            Action:
              - kms:CreateGrant
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey
            Resource: "*"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  CognitoEmailSenderKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}/cognito-email-sender"
      TargetKeyId: !Ref CognitoEmailSenderKmsKey

  SmileUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      DeletionProtection: ACTIVE
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
      LambdaConfig:
        PreSignUp: !GetAtt AuthUsernameFunction.Arn
        PostConfirmation: !GetAtt AuthUsernameFunction.Arn
        CustomEmailSender:
          LambdaArn: !GetAtt AuthEmailSenderFunction.Arn
          LambdaVersion: V1_0
        KMSKeyID: !GetAtt CognitoEmailSenderKmsKey.Arn
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE

  SmileUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: DisableOAuth
    Properties:
      ClientName: !Sub "${AWS::StackName}-web-client"
      UserPoolId: !Ref SmileUserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      RefreshTokenValidity: 7
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  CognitoGoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: EnableGoogleOAuth
    Properties:
      UserPoolId: !Ref SmileUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        authorize_scopes: "openid email profile"
        client_id: !Ref GoogleOAuthClientId
        client_secret: !Ref GoogleOAuthClientSecret
      AttributeMapping:
        email: email
        name: name

  CognitoMicrosoftIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: EnableMicrosoftOAuth
    Properties:
      UserPoolId: !Ref SmileUserPool
      ProviderName: Microsoft
      ProviderType: OIDC
      ProviderDetails:
        attributes_request_method: GET
        authorize_scopes: "openid email profile"
        client_id: !Ref MicrosoftOAuthClientId
        client_secret: !Ref MicrosoftOAuthClientSecret
        oidc_issuer: !Ref MicrosoftOAuthIssuer
      AttributeMapping:
        email: email
        name: name

  SmileUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: EnableAnyOAuth
    Properties:
      Domain: !Ref CognitoOAuthDomainPrefix
      UserPoolId: !Ref SmileUserPool

  SmileGoogleUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: EnableAnyOAuth
    Properties:
      ClientName: !Sub "${AWS::StackName}-web-client-oauth"
      UserPoolId: !Ref SmileUserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      RefreshTokenValidity: 7
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      SupportedIdentityProviders:
        - COGNITO
        - !If [EnableGoogleOAuth, !Ref CognitoGoogleIdentityProvider, !Ref AWS::NoValue]
        - !If [EnableMicrosoftOAuth, !Ref CognitoMicrosoftIdentityProvider, !Ref AWS::NoValue]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs: !Ref CognitoOAuthCallbackUrls
      LogoutURLs: !Ref CognitoOAuthLogoutUrls

  DatasetUploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
            AllowedOrigins: !Ref AllowedOrigins
            ExposedHeaders:
              - ETag
            MaxAge: 300
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTemporaryUploads
            Status: Enabled
            Prefix: uploads/
            ExpirationInDays: 1

  LearningBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          UPLOAD_BUCKET: !Ref DatasetUploadBucket
          LEARNING_PROGRESS_TABLE: !Ref LearningProgressTable
          USERNAME_RESERVATION_TABLE: !Ref UsernameReservationTable
          AUTH_COOLDOWN_TABLE: !Ref AuthCooldownTable
          AUTH_RESEND_COOLDOWN_SECONDS: "30"
          AUTH_CONFIRMATION_CODE_TTL_SECONDS: "300"
          AUTH_PUBLIC_REQUEST_COOLDOWN_SECONDS: "3"
          AUTH_SIGN_IN_COOLDOWN_SECONDS: "2"
          AUTH_SIGN_IN_BURST_LIMIT: "8"
          AUTH_SIGN_IN_BURST_WINDOW_SECONDS: "300"
          AUTH_SIGN_UP_COOLDOWN_SECONDS: "5"
          AUTH_SESSION_REVOKE_BURST_LIMIT: "30"
          AUTH_SESSION_REVOKE_BURST_WINDOW_SECONDS: "60"
          AUTH_REFRESH_SESSION_COOKIE_MAX_AGE_SECONDS: "604800"
          AUTH_REFRESH_SESSION_COOKIE_SECURE: "true"
          AUTH_CONFIRMATION_CODE_PEPPER: !Ref AuthConfirmationCodePepper
          MAX_ZIP_BYTES: "52428800"
          MAX_UNZIPPED_BYTES: "104857600"
          MAX_PROGRESS_JSON_BYTES: "300000"
          COGNITO_USER_POOL_ID: !Ref SmileUserPool
          COGNITO_CLIENT_ID: !If
            - EnableAnyOAuth
            - !Ref SmileGoogleUserPoolClient
            - !Ref SmileUserPoolClient
          COGNITO_CLIENT_SECRET: !If
            - EnableAnyOAuth
            - !GetAtt SmileGoogleUserPoolClient.ClientSecret
            - !GetAtt SmileUserPoolClient.ClientSecret
          COGNITO_OAUTH_DOMAIN: !If
            - EnableAnyOAuth
            - !Sub "https://${CognitoOAuthDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
            - ""
          COGNITO_OAUTH_REDIRECT_URIS: !Join [",", !Ref CognitoOAuthCallbackUrls]
          COGNITO_GOOGLE_IDP_NAME: "Google"
          COGNITO_MICROSOFT_IDP_NAME: "Microsoft"
          COGNITO_REGION: !Ref AWS::Region
          RESEND_API_KEY_SECRET_ID: !Ref ResendApiKeySecretName
          RESEND_FROM_EMAIL: !Ref ResendFromEmail
          RESEND_REPLY_TO_EMAIL: !Ref ResendReplyToEmail
          RESEND_AUTH_TEMPLATE_ID: !Ref ResendAuthTemplateId
          LEARNING_BACKEND_PROXY_SECRET: !Ref LearningBackendProxySecret
          LEARNING_BACKEND_REQUIRE_PROXY_SECRET: !Ref LearningBackendRequireProxySecret
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DatasetUploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref LearningProgressTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsernameReservationTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthCooldownTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminInitiateAuth
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:ConfirmForgotPassword
                - cognito-idp:ForgotPassword
                - cognito-idp:RevokeToken
              Resource: !GetAtt SmileUserPool.Arn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ResendApiKeySecretName}-*"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: !Ref FunctionUrlAllowedOrigins
          AllowMethods:
            - GET
            - POST
            - PUT
          AllowHeaders:
            - authorization
            - content-type
          MaxAge: 300

  AuthUsernameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          USERNAME_RESERVATION_TABLE: !Ref UsernameReservationTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsernameReservationTable

  AuthUsernameFunctionCognitoInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthUsernameFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt SmileUserPool.Arn

  AuthEmailSenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          COGNITO_EMAIL_SENDER_KMS_KEY_ARN: !GetAtt CognitoEmailSenderKmsKey.Arn
          AUTH_COOLDOWN_TABLE: !Ref AuthCooldownTable
          AUTH_CONFIRMATION_CODE_TTL_SECONDS: "300"
          AUTH_CONFIRMATION_CODE_PEPPER: !Ref AuthConfirmationCodePepper
          RESEND_API_KEY_SECRET_ID: !Ref ResendApiKeySecretName
          RESEND_FROM_EMAIL: !Ref ResendFromEmail
          RESEND_REPLY_TO_EMAIL: !Ref ResendReplyToEmail
          RESEND_AUTH_TEMPLATE_ID: !Ref ResendAuthTemplateId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthCooldownTable
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !GetAtt CognitoEmailSenderKmsKey.Arn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ResendApiKeySecretName}-*"

  AuthEmailSenderFunctionCognitoInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthEmailSenderFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt SmileUserPool.Arn

Outputs:
  LearningBackendFunctionUrl:
    Description: Public HTTPS endpoint for the learning backend.
    Value: !GetAtt LearningBackendFunctionUrl.FunctionUrl
  CognitoUserPoolId:
    Description: Cognito user pool used by backend-owned auth.
    Value: !Ref SmileUserPool
  CognitoUserPoolClientId:
    Description: Confidential Cognito app client ID used by backend-owned auth.
    Value: !If
      - EnableAnyOAuth
      - !Ref SmileGoogleUserPoolClient
      - !Ref SmileUserPoolClient
  CognitoRegion:
    Description: Cognito region used by backend-owned auth.
    Value: !Ref AWS::Region
  CognitoOAuthDomain:
    Condition: EnableAnyOAuth
    Description: Cognito Hosted UI OAuth domain used for federated sign-in.
    Value: !Sub "https://${CognitoOAuthDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
  DatasetUploadBucketName:
    Description: Private temporary dataset upload bucket.
    Value: !Ref DatasetUploadBucket
  LearningProgressTableName:
    Description: DynamoDB table storing synced learning progress per Cognito user.
    Value: !Ref LearningProgressTable
  UsernameReservationTableName:
    Description: DynamoDB table reserving unique display usernames.
    Value: !Ref UsernameReservationTable
  AuthCooldownTableName:
    Description: DynamoDB table storing auth resend cooldowns.
    Value: !Ref AuthCooldownTable
  ResendApiKeySecretName:
    Description: Secrets Manager secret name expected by the Cognito custom email sender.
    Value: !Ref ResendApiKeySecretName
