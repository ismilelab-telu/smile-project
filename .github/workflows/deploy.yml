name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  BUN_VERSION: 1.3.6

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "$before" == "0000000000000000000000000000000000000000" ]] ||
            ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r "$after")"
          else
            changed_files="$(git diff --name-only "$before" "$after")"
          fi

          frontend=false
          backend=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              assets/* | \
              data/* | \
              functions/api/* | \
              index.html | \
              models/* | \
              package.json | \
              public/* | \
              src/* | \
              tsconfig*.json | \
              vite.config.ts | \
              wrangler.jsonc | \
              bun.lock)
                frontend=true
                ;;
            esac

            case "$file" in
              backend/aws/learning-backend/samconfig.toml | \
              backend/aws/learning-backend/src/* | \
              backend/aws/learning-backend/template.yaml)
                backend=true
                ;;
            esac
          done <<< "$changed_files"

          {
            echo "frontend=$frontend"
            echo "backend=$backend"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Deployment change detection"
            echo ""
            echo "- Frontend: $frontend"
            echo "- Backend: $backend"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-backend:
    name: Deploy backend
    needs:
      - changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/aws/learning-backend
    env:
      ALLOWED_ORIGINS: ${{ vars.BACKEND_ALLOWED_ORIGINS || 'http://127.0.0.1:5317,http://localhost:5317,https://smile-project.pages.dev' }}
      AUTH_CONFIRMATION_CODE_PEPPER: ${{ secrets.AUTH_CONFIRMATION_CODE_PEPPER }}
      FUNCTION_URL_ALLOWED_ORIGINS: ${{ vars.BACKEND_FUNCTION_URL_ALLOWED_ORIGINS || 'http://127.0.0.1:5317,http://localhost:5317' }}
      LEARNING_BACKEND_PROXY_SECRET: ${{ secrets.LEARNING_BACKEND_PROXY_SECRET }}
      RESEND_API_KEY_SECRET_NAME: ${{ vars.RESEND_API_KEY_SECRET_NAME || 'smile/resend/api-key' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up SAM
        uses: aws-actions/setup-sam@v2

      - name: Install backend dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s tests

      - name: Validate SAM template
        run: sam validate --config-env ci --template-file template.yaml --region "$AWS_REGION"

      - name: Build backend
        run: sam build --config-env ci

      - name: Deploy backend
        shell: bash
        run: |
          set -euo pipefail

          : "${LEARNING_BACKEND_PROXY_SECRET:?Set LEARNING_BACKEND_PROXY_SECRET as a GitHub repository secret.}"

          parameter_overrides=(
            "AllowedOrigins=${ALLOWED_ORIGINS}"
            "FunctionUrlAllowedOrigins=${FUNCTION_URL_ALLOWED_ORIGINS}"
            "ResendApiKeySecretName=${RESEND_API_KEY_SECRET_NAME}"
            "LearningBackendProxySecret=${LEARNING_BACKEND_PROXY_SECRET}"
            "LearningBackendRequireProxySecret=true"
          )

          if [[ -n "${AUTH_CONFIRMATION_CODE_PEPPER:-}" ]]; then
            parameter_overrides+=("AuthConfirmationCodePepper=${AUTH_CONFIRMATION_CODE_PEPPER}")
          fi

          sam deploy --config-env ci --parameter-overrides "${parameter_overrides[@]}"

  deploy-frontend:
    name: Deploy frontend
    needs:
      - changes
      - deploy-backend
    if: ${{ always() && needs.changes.outputs.frontend == 'true' && (needs.changes.outputs.backend != 'true' || needs.deploy-backend.result == 'success') }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'smile-project' }}
      VITE_LEARNING_BACKEND_URL: /api/learning-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Check frontend
        run: vp check src

      - name: Build frontend
        run: vp build

      - name: Deploy frontend
        shell: bash
        run: |
          set -euo pipefail

          : "${CLOUDFLARE_API_TOKEN:?Set CLOUDFLARE_API_TOKEN as a GitHub repository secret.}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Set CLOUDFLARE_ACCOUNT_ID as a GitHub repository secret or variable.}"

          wrangler pages deploy dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --branch "$GITHUB_REF_NAME" \
            --commit-hash "$GITHUB_SHA"
